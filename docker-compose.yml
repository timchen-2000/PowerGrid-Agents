version: '3.8'

services:
  power-equipment-agent:
    build: .
    ports:
      - "8000:8000"
      - "3000:3000"
    volumes:
      - ".:/app"
      - "./faiss_db:/app/faiss_db"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
    restart: unless-stopped
